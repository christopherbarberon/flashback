<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liste Stream Flashback</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #e6e6e6;
    }

    .container {
      width: 90%;
      margin: 20px auto;
      background-color: #f2f2f2;
      padding: 20px;
      border-radius: 10px;
    }

    .title {
      background-color: #b30000;
      color: white;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
      width: fit-content;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .player {
      background-color: #1e90ff;
      height: 220px;
      border-radius: 10px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Liste Stream Flashback</div>

    <div class="grid">

      <div class="player"><iframe src="https://player.twitch.tv/?channel=jltomy&parent=localhost" allowfullscreen></iframe></div>
